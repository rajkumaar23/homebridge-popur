name: Publish to npm

# Publishes the package when you create a GitHub Release.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required. Configure this
# repo + workflow as a trusted publisher for the package on npmjs.com first.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing needs a recent npm.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm publish --provenance --access public
